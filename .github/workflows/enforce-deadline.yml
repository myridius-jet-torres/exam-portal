name: Enforce 24h Deadline

on:
  schedule:
    - cron: '0 * * * *'  # Check every hour
  workflow_dispatch: {}   # Manual trigger for testing

jobs:
  check-deadlines:
    runs-on: ubuntu-latest
    steps:
      - name: Check all candidate repos for expired deadlines
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.EXAM_PAT }}
          script: |
            const owner = 'myridius-jet-torres';
            const DEADLINE_HOURS = 24;

            // List all flight-upgrade-engine-* repos
            const repos = await github.paginate(github.rest.repos.listForUser, {
              username: owner,
              per_page: 100
            });

            const candidateRepos = repos.filter(r => 
              r.name.startsWith('flight-upgrade-engine-') && 
              r.name !== 'flight-upgrade-engine'
            );

            for (const repo of candidateRepos) {
              try {
                // Read metadata file
                const { data: file } = await github.rest.repos.getContent({
                  owner,
                  repo: repo.name,
                  path: '.exam-metadata.json'
                });
                
                const metadata = JSON.parse(Buffer.from(file.content, 'base64').toString());
                
                if (metadata.expired) {
                  continue; // Already processed
                }

                // Find when candidate first pushed (accepted invite proxy)
                const { data: commits } = await github.rest.repos.listCommits({
                  owner,
                  repo: repo.name,
                  per_page: 100
                });

                // Find first commit NOT by the repo owner
                const candidateCommit = [...commits].reverse().find(c => 
                  c.author && c.author.login !== owner && c.author.login !== 'github-actions[bot]'
                );

                if (!candidateCommit) {
                  console.log(`${repo.name}: No candidate commits yet, skipping`);
                  continue;
                }

                const startTime = new Date(candidateCommit.commit.author.date);
                const deadline = new Date(startTime.getTime() + DEADLINE_HOURS * 60 * 60 * 1000);
                const now = new Date();

                console.log(`${repo.name}: started=${startTime.toISOString()}, deadline=${deadline.toISOString()}, now=${now.toISOString()}`);

                if (now > deadline) {
                  console.log(`⏰ EXPIRED: ${repo.name} — revoking access for ${metadata.githubUsername}`);
                  
                  // Revoke collaborator access
                  try {
                    await github.rest.repos.removeCollaborator({
                      owner,
                      repo: repo.name,
                      username: metadata.githubUsername
                    });
                    console.log(`Revoked push access for ${metadata.githubUsername}`);
                  } catch (err) {
                    console.log(`Failed to revoke: ${err.message}`);
                  }

                  // Update metadata to mark as expired
                  metadata.expired = true;
                  metadata.expiredAt = now.toISOString();
                  metadata.firstCommitAt = startTime.toISOString();
                  metadata.deadlineAt = deadline.toISOString();

                  await github.rest.repos.createOrUpdateFileContents({
                    owner,
                    repo: repo.name,
                    path: '.exam-metadata.json',
                    message: 'exam: deadline expired — access revoked',
                    content: Buffer.from(JSON.stringify(metadata, null, 2)).toString('base64'),
                    sha: file.sha
                  });
                }
              } catch (err) {
                // No metadata file = manually created repo, skip
                if (err.status !== 404) {
                  console.log(`Error processing ${repo.name}: ${err.message}`);
                }
              }
            }
